# Глухомань — production nginx vhost
# Копіювати в /etc/nginx/sites-available/gluhoman і створити симлінк у sites-enabled/.
# Замініть server_name якщо домен інший.

# Rate limit зона для booking/API ендпоінтів
limit_req_zone $binary_remote_addr zone=gluhoman_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name gluhoman.com.ua www.gluhoman.com.ua;

    # Let's Encrypt HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gluhoman.com.ua www.gluhoman.com.ua;

    # SSL (certbot заповнить після запуску)
    ssl_certificate /etc/letsencrypt/live/gluhoman.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gluhoman.com.ua/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Логи
    access_log /var/log/nginx/gluhoman-access.log;
    error_log  /var/log/nginx/gluhoman-error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Client upload limit (майбутні фото з admin)
    client_max_body_size 10M;

    # Кеш Next.js статики (hashed, immutable)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        proxy_set_header Host $host;
    }

    # Кеш зображень і відео
    location ~* ^/(images|videos|og-.*\.jpg|favicon\.ico|logo\.svg|logo\.png)/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800" always;
        proxy_set_header Host $host;
    }

    # Rate limit для API
    location /api/ {
        limit_req zone=gluhoman_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Все інше — на Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
