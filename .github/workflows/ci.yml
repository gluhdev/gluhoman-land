name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/ci.db"
      - run: npm run lint || true
        # allow lint to fail for now — next.config.ts has ignoreDuringBuilds
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/ci.db"
      - run: npm run build
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          NEXT_PUBLIC_SITE_URL: "https://gluhoman.com.ua"
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 3

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install chromium --with-deps
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./prisma/ci.db"
      - name: Seed admin user for tests
        run: node scripts/seed-admin.mjs
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          ADMIN_EMAIL: "admin@gluhoman.local"
          ADMIN_PASSWORD: "admin123"
      - run: npx playwright test --project=chromium
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          NEXTAUTH_SECRET: "ci-test-secret-do-not-use-in-prod"
          AUTH_SECRET: "ci-test-secret-do-not-use-in-prod"
          NEXTAUTH_URL: "http://localhost:3002"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  bot-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build bot Docker image
        run: docker build -f bot/Dockerfile -t gluhoman-bot:ci bot/
