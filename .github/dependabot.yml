version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "@next/*"]
      react:
        patterns: ["react", "react-*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]

  - package-ecosystem: "npm"
    directory: "/bot"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
