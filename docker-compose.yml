services:
  gluhoman:
    build:
      context: .
      dockerfile: Dockerfile
    image: gluhoman-site:latest
    container_name: gluhoman-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Load DATABASE_URL, AUTH_SECRET, NEXTAUTH_SECRET, NEXTAUTH_URL,
    # ADMIN_EMAIL/PASSWORD, POSTGRES_*, SENTRY_DSN etc. from .env.
    # Without this the site crashes with "MissingSecret" from NextAuth
    # on the first middleware invocation.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Public URL — used by sitemap, robots, JSON-LD, OG metadata
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://gluhoman.com.ua}
      # Telegram bot for booking notifications
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Email delivery (optional, second channel)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BOOKING_EMAIL_FROM=${BOOKING_EMAIL_FROM:-}
      - BOOKING_EMAIL_TO=${BOOKING_EMAIL_TO:-}
      # LiqPay (hotel/aquapark/sauna payments)
      - LIQPAY_PUBLIC_KEY=${LIQPAY_PUBLIC_KEY:-}
      - LIQPAY_PRIVATE_KEY=${LIQPAY_PRIVATE_KEY:-}
      - STUB_PAYMENTS=${STUB_PAYMENTS:-0}
    volumes:
      # Persist admin-uploaded images across container redeploys.
      # On first deploy: mkdir -p uploads && chmod 755 uploads
      - ./uploads:/app/public/uploads
    healthcheck:
      # Use 127.0.0.1 explicitly: BusyBox wget (alpine base) resolves
      # "localhost" to ::1 (IPv6) first, but Node listens on IPv4 only,
      # so "localhost" gives a permanent Connection-refused and marks
      # the container unhealthy forever even when the site works fine.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
